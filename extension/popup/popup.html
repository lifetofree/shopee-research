<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shopee TH Capture</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Shopee TH Capture</h1>
  </header>

  <section class="status">
    <div class="row">
      <span class="label">Local server</span>
      <span id="server-status" class="value checking">checking…</span>
    </div>
    <div class="row">
      <span class="label">Captured</span>
      <span id="captured-count" class="value">—</span>
    </div>
    <div class="row">
      <span class="label">Last surface</span>
      <span id="last-surface" class="value">—</span>
    </div>
    <div class="row">
      <span class="label">Last save</span>
      <span id="last-saved-at" class="value">—</span>
    </div>
    <div id="error-row" class="row error hidden">
      <span class="label">Error</span>
      <span id="last-error" class="value"></span>
    </div>
  </section>

  <section class="hint">
    <p>Browse offers on <code>affiliate.shopee.co.th</code> and click the orange
    <strong>Save</strong> button on any product card. Saved items (with
    commission) appear at <a id="app-link" href="#" target="_blank"
    rel="noopener">127.0.0.1:8000</a>, where you can generate captions.</p>
  </section>

  <script src="popup.js"></script>
</body>
</html>
